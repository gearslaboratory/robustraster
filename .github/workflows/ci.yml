name: CI Pipeline

on:
  push:
    branches:
      - main
      - experiment-code  # Add other branches you want to test
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          - name: Run tests
          run: pytest tests/
          
      - name: Debug Secrets
        run: |
            if [ -z "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}" ]; then
              echo "SECRET IS EMPTY!"
            else
              echo "SECRET IS SET!"
            fi
      # **Set up Google Cloud authentication**
      - name: Authenticate Google Cloud
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > $GOOGLE_APPLICATION_CREDENTIALS
          gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
          gcloud config set project robust-raster  # Replace with your Google Cloud Project ID
      
